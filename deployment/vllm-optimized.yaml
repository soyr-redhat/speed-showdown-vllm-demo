apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-optimized
  namespace: speed-showdown
  labels:
    app: vllm-optimized
    vllm-type: optimized
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-optimized
  template:
    metadata:
      labels:
        app: vllm-optimized
        vllm-type: optimized
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: speed-showdown-secrets
              key: hf-token
              optional: true
        args:
        - --model
        - mistralai/Mistral-Small-Instruct-2409
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --max-model-len
        - "8192"
        - --gpu-memory-utilization
        - "0.95"
        # Optimization flags
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --max-num-batched-tokens
        - "16384"
        - --max-num-seqs
        - "256"
        - --disable-log-requests
        resources:
          requests:
            memory: "18Gi"
            cpu: "4000m"
          limits:
            memory: "18Gi"
            cpu: "8000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-optimized
  namespace: speed-showdown
  labels:
    app: vllm-optimized
spec:
  selector:
    app: vllm-optimized
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP
