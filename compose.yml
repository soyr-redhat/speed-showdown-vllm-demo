# Compose file for local development
# Compatible with both podman-compose and docker-compose
version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    environment:
      - VLLM_STANDARD_URL=${VLLM_STANDARD_URL:-http://localhost:8001/v1}
      - VLLM_OPTIMIZED_URL=${VLLM_OPTIMIZED_URL:-http://localhost:8002/v1}
      - VLLM_QUANTIZED_URL=${VLLM_QUANTIZED_URL:-http://localhost:8003/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-}
      - VLLM_STANDARD_MODEL=${VLLM_STANDARD_MODEL:-mistralai/Mistral-Small-Instruct-2409}
      - VLLM_OPTIMIZED_MODEL=${VLLM_OPTIMIZED_MODEL:-mistralai/Mistral-Small-Instruct-2409}
      - VLLM_QUANTIZED_MODEL=${VLLM_QUANTIZED_MODEL:-RedHatAI/Mistral-Small-3.1-24B-Instruct-2503-FP8-dynamic}
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: speed-showdown-network
