apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-cpu
  namespace: speed-showdown
  labels:
    app: ollama-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-cpu
  template:
    metadata:
      labels:
        app: ollama-cpu
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
          name: http
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_MODELS
          value: /models
        - name: HOME
          value: /tmp/ollama
        volumeMounts:
        - name: ollama-data
          mountPath: /models
      initContainers:
      - name: pull-model
        image: ollama/ollama:latest
        command:
        - /bin/sh
        - -c
        - |
          export HOME=/tmp/ollama
          mkdir -p $HOME/.ollama
          ollama serve &
          sleep 10
          ollama pull llama3.1:8b
          sleep 5
          pkill ollama
        env:
        - name: OLLAMA_MODELS
          value: /models
        volumeMounts:
        - name: ollama-data
          mountPath: /models
      volumes:
      - name: ollama-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-cpu
  namespace: speed-showdown
  labels:
    app: ollama-cpu
spec:
  selector:
    app: ollama-cpu
  ports:
  - port: 11434
    targetPort: 11434
    protocol: TCP
    name: http
  type: ClusterIP
